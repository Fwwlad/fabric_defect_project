<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сегментация дефектов тканей</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>Сегментация дефектов тканей</h1>

    <p class="subtitle">
        Автоматическое обнаружение дефектов полипропиленовых тканей
    </p>

    <div class="upload-panel">

        <input
                type="file"
                id="imageInput"
                accept=".jpg,.jpeg,.png">

        <button id="processButton">
            Запустить обработку
        </button>

    </div>

    <div class="images">

        <div class="card">

            <h2>Исходное изображение</h2>

            <img
                    id="originalImage"
                    src=""
                    alt="Исходное изображение">

        </div>

        <div class="card">

            <h2>Результат сегментации</h2>

            <img
                    id="resultImage"
                    src=""
                    alt="Результат">

        </div>

    </div>

    <div class="stats">

        <h2>Статистика</h2>

        <p>Количество кружек/стаканов:
            <span id="count">—</span>
        </p>

        <p>Время обработки:
            <span id="time">—</span>
        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
